<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Color Markers | Interactive CSS</title>
  <link rel="stylesheet" href="colormarker.css" />
</head>

<body>
  <a href="../../index.html" class="nav-back">
    <span>&larr;</span> Back to Projects Hub
  </a>

  <header>
    <h1>Color Markers</h1>
    <p class="subtitle">Interactive 3D CSS Components</p>
  </header>

  <div class="container">
    <div class="marker red" id="marker-red" data-color="#F53E71">
      <div class="cap"></div>
      <div class="sleeve"></div>
      <div class="tip"></div>
    </div>
    <div class="marker green" id="marker-green" data-color="#71F53E">
      <div class="cap"></div>
      <div class="sleeve"></div>
      <div class="tip"></div>
    </div>
    <div class="marker blue" id="marker-blue" data-color="#3E9DF5">
      <div class="cap"></div>
      <div class="sleeve"></div>
      <div class="tip"></div>
    </div>
  </div>

  <div class="info-panel" id="info-panel">
    <span class="color-code" id="color-display">Select a marker</span>
  </div>

  <script src="script.js"></script>
</body>

</html>
