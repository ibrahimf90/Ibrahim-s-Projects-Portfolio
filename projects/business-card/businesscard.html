<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Business Card | Ibrahim Fayyad</title>
  <!-- Use Google Fonts (Outfit is modern and sleek) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="businesscard.css" />
</head>

<body>
  <!-- Abstract background elements for a tech/modern look -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card-container">
    <div class="business-card glass">
      <div class="card-header">
        <div class="profile-frame">
          <img class="profile-image" src="../../img/profile.jpg" alt="Profile Picture" onerror="
                this.onerror = null;
                this.src =
                  'https://ui-avatars.com/api/?name=Ibrahim+Fayyad&background=2563eb&color=fff&size=150';
              " />
        </div>
      </div>

      <div class="card-body">
        <h1 class="full-name">Ibrahim Fayyad</h1>
        <p class="designation">Full Stack Web Developer</p>
        <div class="badges">
          <span class="badge">FrontEnd</span>
          <span class="badge">BackEnd</span>
          <span class="badge">Freelance</span>
        </div>

        <div class="contact-info">
          <a href="mailto:ibrahimfayyad17@gmail.com" class="contact-item">
            <i class="fa-solid fa-envelope"></i>
            <span>ibrahimfayyad17@gmail.com</span>
          </a>
          <a href="https://wa.me/004915214208620" class="contact-item">
            <i class="fa-solid fa-phone"></i>
            <span>+49 1521 4208620</span>
          </a>
        </div>

        <div class="social-media">
          <span>Connect with me</span>
          <div class="social-icons">
            <a href="https://www.facebook.com/ibrahim.f1990" target="_blank" class="social-icon facebook">
              <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="https://www.instagram.com/ibrahim.f1990" target="_blank" class="social-icon instagram">
              <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.github.com/ibrahimf90" target="_blank" class="social-icon github">
              <i class="fa-brands fa-github"></i>
            </a>
          </div>
        </div>

        <div style="margin-top: 30px">
          <a href="../../index.html" class="contact-item" style="
                justify-content: center;
                background: rgba(15, 23, 42, 0.05);
                border: 1px dashed var(--primary);
              ">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Back to Projects Hub</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
