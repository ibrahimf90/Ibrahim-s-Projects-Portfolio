<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Registration Form</title>
  <link rel="stylesheet" href="registration-form.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@400;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="background-animation"></div>

  <nav class="top-nav">
    <a href="../../index.html" class="back-link">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
      </svg>
      Back to Projects Hub
    </a>
  </nav>

  <div class="glass-wrapper">
    <div class="form-container">
      <header>
        <h1>Registration Form</h1>
        <p>Join our community by filling out the details below.</p>
      </header>

      <form method="post" action="/register">
        <fieldset>
          <div class="input-group">
            <label for="first-name">First Name</label>
            <input id="first-name" name="first-name" type="text" placeholder="John" required />
          </div>
          <div class="input-group">
            <label for="last-name">Last Name</label>
            <input id="last-name" name="last-name" type="text" placeholder="Doe" required />
          </div>
          <div class="input-group">
            <label for="email">Email Address</label>
            <input id="email" name="email" type="email" placeholder="john.doe@example.com" required />
          </div>
          <div class="input-group">
            <label for="new-password">Password</label>
            <input id="new-password" name="new-password" type="password" placeholder="••••••••" pattern="[a-z0-5]{8,}"
              required />
            <small>Minimum 8 characters (a-z, 0-5)</small>
          </div>
        </fieldset>

        <fieldset class="radio-fieldset">
          <legend>Account type</legend>
          <div class="radio-group">
            <label for="personal-account" class="radio-label">
              <input id="personal-account" type="radio" name="account-type" value="personal" class="inline" checked />
              <span class="custom-radio"></span>
              Personal
            </label>
            <label for="business-account" class="radio-label">
              <input id="business-account" type="radio" name="account-type" value="business" class="inline" />
              <span class="custom-radio"></span>
              Business
            </label>
          </div>
        </fieldset>

        <fieldset>
          <div class="input-group">
            <label for="profile-picture">Profile Picture</label>
            <input id="profile-picture" type="file" name="file" />
          </div>
          <div class="input-group">
            <label for="age">Age (years)</label>
            <input id="age" type="number" name="age" min="13" max="120" placeholder="25" />
          </div>
          <div class="input-group">
            <label for="referrer">How did you hear about us?</label>
            <select id="referrer" name="referrer">
              <option value="">Select an option</option>
              <option value="1">News</option>
              <option value="2">YouTube</option>
              <option value="3">Forum</option>
              <option value="4">Other</option>
            </select>
          </div>
          <div class="input-group">
            <label for="bio">Short Bio</label>
            <textarea id="bio" name="bio" rows="3" placeholder="Tell us a little about yourself..."></textarea>
          </div>
        </fieldset>

        <div class="terms-section">
          <label for="terms-and-conditions" class="checkbox-label">
            <input class="inline" name="terms" id="terms-and-conditions" type="checkbox" required />
            <span class="custom-checkbox"></span>
            I accept the <a href="terms.html" target="_blank">terms and
              conditions</a>
          </label>
        </div>

        <div class="submit-section">
          <button type="submit" class="submit-btn">Create Account</button>
        </div>
      </form>
    </div>
  </div>
    <footer class="glass-footer" style="margin-top: 3rem; padding: 2rem 5%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(255, 255, 255, 0.1); color: #94a3b8; text-align: center;">
      <div class="footer-content" style="max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
        <p style="margin: 0; font-size: 0.9rem; font-family: sans-serif;">&copy; 2026 Ibrahim Fayyad. Designed & Developed with passion.</p>
        <div class="footer-links">
          <a href="https://github.com/ibrahimf90" target="_blank" rel="noopener noreferrer" class="github-link" style="display: flex; align-items: center; gap: 0.5rem; color: #f8fafc; text-decoration: none; font-size: 0.95rem; font-weight: 500; padding: 0.5rem 1rem; background: rgba(255, 255, 255, 0.05); border-radius: 99px; border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; font-family: sans-serif;">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            GitHub Profile
          </a>
        </div>
      </div>
    </footer>
</body>
</html>
