<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Form</title>
    <link rel="stylesheet" href="work-form.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">
      <a href="../../index.html" class="back-btn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m15 18-6-6 6-6" />
        </svg>
        Back to Projects Hub
      </a>
      <h1>Application Form</h1>
      <p>Please fill out the form below to apply for a position.</p>
      <form id="application-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="John Doe" required />
          </div>

          <div class="form-group">
            <label for="email">E-mail Address</label>
            <input
              type="email"
              id="email"
              placeholder="john@example.com"
              required
            />
          </div>
        </div>

        <div class="form-group full-width">
          <label for="address">Street Address</label>
          <input type="text" id="address" placeholder="123 Main St" required />
        </div>

        <div class="form-grid three-col">
          <div class="form-group">
            <label for="country">Country</label>
            <input type="text" id="country" placeholder="USA" required />
          </div>

          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="New York" required />
          </div>

          <div class="form-group">
            <label for="zip">Zip Code</label>
            <input type="text" id="zip" placeholder="10001" required />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required />
          </div>

          <div class="form-group">
            <label for="position">Position</label>
            <select id="position" required>
              <option value="" disabled>Select a position</option>
              <option value="manager">Manager</option>
              <option value="fullstack" selected>Full Stack</option>
              <option value="webdesign">Web Design</option>
              <option value="backend">Back End</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="experience">Years of Experience</label>
            <input
              type="number"
              id="experience"
              min="0"
              max="50"
              placeholder="e.g. 5"
              required
            />
          </div>

          <div class="form-group">
            <label for="social">Social Media Link</label>
            <input
              type="url"
              id="social"
              placeholder="https://linkedin.com/in/username"
            />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="language">Primary Language</label>
            <select id="language" required>
              <option value="" disabled selected>Select Language</option>
              <option value="english">English</option>
              <option value="spanish">Spanish</option>
              <option value="french">French</option>
              <option value="german">German</option>
              <option value="chinese">Chinese</option>
            </select>
          </div>

          <div class="form-group">
            <label for="lang-level">Proficiency Level</label>
            <select id="lang-level" required>
              <option value="" disabled selected>Select Level</option>
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
              <option value="native">Native / Bilingual</option>
            </select>
          </div>
        </div>

        <div class="form-group full-width">
          <label for="cv">Upload CV (PDF, DOCX)</label>
          <div class="file-upload-wrapper">
            <input type="file" id="cv" accept=".pdf,.doc,.docx" required />
            <span class="file-upload-text"
              >Click or drag to upload your CV</span
            >
          </div>
        </div>

        <fieldset class="radio-group">
          <legend>Availability</legend>
          <div class="radio-options">
            <div class="radio-item">
              <input type="radio" name="availability" id="full-time" checked />
              <label for="full-time">Full-Time</label>
            </div>
            <div class="radio-item">
              <input type="radio" name="availability" id="part-time" />
              <label for="part-time">Part-time</label>
            </div>
            <div class="radio-item">
              <input type="radio" name="availability" id="internship" />
              <label for="internship">Internship</label>
            </div>
          </div>
        </fieldset>

        <div class="form-group full-width">
          <label for="message">Your Message</label>
          <textarea
            id="message"
            rows="4"
            placeholder="Tell us about yourself..."
          ></textarea>
        </div>

        <button type="submit" name="submit" id="submit">
          Submit Application
        </button>
      </form>
    </div>
    <footer class="glass-footer" style="width: 100%; box-sizing: border-box; margin-top: 3rem; margin-bottom: 0; padding: 2rem 5%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(255, 255, 255, 0.1); color: #94a3b8; text-align: center;">

        <p style="margin: 0; font-size: 0.9rem; font-family: sans-serif;">&copy; 2026 Ibrahim Fayyad. Designed & Developed with passion.</p>

            </svg>
            GitHub Profile

        </div>
      </div>
    </footer>
  </body>
</html>
