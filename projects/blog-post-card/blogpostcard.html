<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Blog Post Card</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="blogpostcard.css" />
  </head>

  <body>
    <a href="../../index.html" class="back-btn">
      <svg fill="currentColor" viewBox="0 0 24 24" width="20" height="20">
        <path
          d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"
        />
      </svg>
      Back to Projects Hub
    </a>
    <div class="card-container">
      <div class="blog-post-card">
        <div class="img-wrapper">
          <img
            class="post-img"
            src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg"
            alt="learning programming"
          />
          <div class="category-badge">Technology</div>
        </div>
        <div class="post-content">
          <span class="post-date">October 24, 2026</span>
          <h2 class="post-title">Learning Programming in 2026</h2>
          <p class="post-excerpt">
            Stay ahead of the curve with the latest trends in web development.
            Discover what's new and exciting in the constantly evolving tech
            universe to elevate your skills.
          </p>
          <div class="post-footer">
            <div class="author-info">
              <img
                src="https://ui-avatars.com/api/?name=W+S&background=0D8ABC&color=fff"
                alt="w3Schools Website"
                class="author-img"
              />
              <span class="author-name">W3Schools</span>
            </div>
            <a
              class="read-more"
              href="https://www.w3schools.com/"
              target="_blank"
            >
              Read More
              <svg
                fill="currentColor"
                viewBox="0 0 24 24"
                width="16"
                height="16"
              >
                <path
                  d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"
                />
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
